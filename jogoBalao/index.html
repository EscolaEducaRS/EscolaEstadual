<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Balões Matemáticos - Escola Estadual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Camada de Início: Centralizada para focar a atenção do aluno -->
    <div id="tela-inicial">
        <button id="botao-master" onclick="comecarAgora()">VAMOS JOGAR!</button>
    </div>

    <div id="layout-principal">
        <!-- Barra Lateral Esquerda: Informações fixas do jogo -->
        <aside id="menu-lateral">
            <div class="user-info">
                <h2 id="nome-aluno">Olá!</h2>
                <!-- Exibe a Fase e o progresso para o próximo nível -->
                <div id="placar">Fase: 1 | Pontos: 0</div>
                <div id="progresso">Acertos: 0/5</div>
            </div>

            <!-- Caixa da Pergunta com Borda Verde solicitada anteriormente -->
            <div id="caixa-pergunta">
                <span>Resolva:</span>
                <div id="num-conta">...</div>
            </div>

            <div id="ranking-top">
                <h3>🏆 TOP 10</h3>
                <div id="lista-rank"></div>
            </div>
        </aside>

        <!-- Área de Jogo onde os balões sobem -->
        <main id="area-baloes"></main>
    </div>

    <script src="baloes.js"></script>
</body>
</html>
