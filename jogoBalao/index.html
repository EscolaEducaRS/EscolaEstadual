<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balões Matemáticos - Escola Estadual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Overlay Inicial: Botão grande para começar o jogo -->
    <div id="overlay-inicio">
        <button id="btn-comecar" onclick="iniciarJogo()">CLIQUE PARA INICIAR</button>
    </div>

    <div id="layout-jogo">
        <!-- Coluna Lateral Esquerda -->
        <aside id="barra-lateral">
            <div class="sessao-usuario">
                <h2 id="msg-boas-vindas">Olá!</h2>
                <div id="painel-status">Fase: 1 | Pontos: 0</div>
                <button id="btn-pause" onclick="alternarPause()">Pausar</button>
            </div>

            <div id="display-expressao">
                <p>Quanto é?</p>
                <div id="texto-conta">...</div>
                <div id="info-velocidade">Média: <span id="valor-media">0.00</span>s</div>
            </div>

            <div id="container-ranking">
                <h3>🏆 Ranking Top 10</h3>
                <div id="lista-ranking"></div>
            </div>
        </aside>

        <!-- Campo de Jogo na Direita -->
        <main id="campo-baloes"></main>
    </div>

    <script src="baloes.js"></script>
</body>
</html>
