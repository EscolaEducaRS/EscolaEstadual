<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Balões Matemáticos - Escola Estadual</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87CEEB; }
        #cenario { width: 100vw; height: 100vh; position: relative; }
        #painel-info { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 10px; z-index: 10; }
        .balao {
            position: absolute;
            bottom: -100px;
            width: 80px;
            height: 100px;
            background-image: url('../baloes.jpg'); /* Referência ao seu arquivo JPG */
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .balao:hover { transform: scale(1.1); }
        #conta { font-size: 32px; color: #2c3e50; }
    </style>
</head>
<body>
    <div id="cenario">
        <div id="painel-info">
            <div id="saudacao"></div>
            <div id="conta">Carregando...</div>
            <div id="status">Fase: 1 | Pontos: 0</div>
        </div>
    </div>
    <script src="baloes.js"></script>
</body>
</html>
