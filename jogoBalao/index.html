<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balões Matemáticos - Escola Estadual</title>
    <!-- Importação do CSS externo para manter o código limpo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="layout-jogo">
        <!-- Coluna Lateral Esquerda: Informações e Ranking -->
        <aside id="barra-lateral">
            <div class="sessao-usuario">
                <h2 id="msg-boas-vindas">Carregando...</h2>
                <div id="painel-status">Fase: 1 | Pontos: 0</div>
                <!-- Botão de Pause integrado à interface -->
                <button id="btn-pause" onclick="alternarPause()">Pausar Jogo</button>
            </div>

            <!-- Área da Expressão Matemática com Borda Verde -->
            <div id="display-expressao">
                <p>Quanto é?</p>
                <div id="texto-conta">...</div>
                <div id="info-velocidade">Média: <span id="valor-media">0.00</span>s</div>
            </div>

            <!-- Ranking dos 10 Melhores -->
            <div id="container-ranking">
                <h3>🏆 Melhores 10</h3>
                <div id="lista-ranking">
                    <!-- Preenchido dinamicamente pelo baloes.js -->
                </div>
            </div>
        </aside>

        <!-- Campo de Jogo: Onde os balões voam -->
        <main id="campo-baloes"></main>
    </div>

    <!-- Script principal do jogo -->
    <script src="baloes.js"></script>
</body>
</html>
