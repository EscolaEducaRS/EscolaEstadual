<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Balões Matemáticos - Escola Estadual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <!-- Coluna Esquerda -->
        <aside id="sidebar">
            <div class="bloco">
                <h2 id="saudacao">Olá!</h2>
                <div id="placar">Fase: 1 | Pontos: 0</div>
            </div>

            <!-- Área da Expressão com Borda -->
            <div id="box-expressao">
                <span>Resolva:</span>
                <div id="conta">0 + 0</div>
                <small>Tempo Médio: <span id="tempo-atual">0</span>s</small>
            </div>

            <!-- Ranking Top 10 -->
            <div id="ranking">
                <h3>🏆 Melhores 10</h3>
                <div id="lista-ranking">
                    <!-- Gerado pelo JS -->
                </div>
            </div>
        </aside>

        <!-- Área de Jogo -->
        <main id="cenario"></main>
    </div>
    <script src="baloes.js"></script>
</body>
</html>
