<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Balões Matemáticos - Escola Estadual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container-principal">
        <!-- Coluna Esquerda: Informações e Ranking -->
        <aside id="sidebar">
            <div id="info-aluno">
                <h2 id="saudacao">Olá!</h2>
                <div id="status">Fase: 1 | Pontos: 0</div>
            </div>

            <div id="area-expressao">
                <p>Resolva:</p>
                <div id="conta">0 + 0</div>
            </div>

            <div id="ranking-container">
                <h3>🏆 Top 10 Ranking</h3>
                <ol id="lista-ranking">
                    <!-- Os 10 melhores aparecerão aqui via JS -->
                </ol>
            </div>
        </aside>

        <!-- Área Direita: Onde os balões voam -->
        <main id="cenario">
            <!-- Balões gerados pelo baloes.js -->
        </main>
    </div>

    <script src="baloes.js"></script>
</body>
</html>
