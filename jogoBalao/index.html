<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Balões Matemáticos - Escola Estadual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="layout-jogo">
        <!-- Coluna Lateral Esquerda -->
        <aside id="barra-lateral">
            <div class="bloco">
                <h2 id="msg-boas-vindas">Olá!</h2>
                <div id="painel-pontos">Fase: 1 | Pontos: 0</div>
                <!-- NOVO: Botão de Pause -->
                <button id="btn-pause" onclick="alternarPause()">Pausar Jogo</button>
            </div>

            <!-- Área da Expressão com Borda Verde -->
            <div id="container-expressao">
                <p>Resolva agora:</p>
                <div id="texto-conta">0 + 0</div>
                <div id="media-info">Tempo Médio: <span id="valor-media">0</span>s</div>
            </div>

            <!-- Ranking Top 10 -->
            <div id="secao-ranking">
                <h3>🏆 Ranking (Top 10)</h3>
                <div id="exibicao-ranking"></div>
            </div>
        </aside>

        <!-- Área de Jogo (Direita) -->
        <main id="campo-baloes"></main>
    </div>
    <script src="baloes.js"></script>
</body>
</html>
