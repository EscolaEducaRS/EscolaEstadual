<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Jogos - Escola Estadual</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background-color: #4CAF50; color: white; }
        .btn-secondary { background-color: #2196F3; color: white; }
        .btn-danger { background-color: #f44336; color: white; }
        .hidden { display: none; }
        ul { list-style: none; padding: 0; }
        li { background: #f9f9f9; margin: 10px 0; padding: 15px; border-radius: 8px; border-left: 5px solid #4CAF50; }
        a { text-decoration: none; color: #333; font-weight: bold; display: block; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Escola Estadual</h1>
        
        <!-- Tela de Boas-vindas/Login -->
        <div id="tela-verificacao" class="hidden">
            <p id="mensagem-retorno"></p>
            <button class="btn-primary" onclick="confirmarLogin()">Sim, sou eu!</button>
            <button class="btn-secondary" onclick="mostrarCadastro()">Não, criar novo perfil</button>
        </div>

        <!-- Formulário de Cadastro -->
        <div id="tela-cadastro" class="hidden">
            <h3>Novo Cadastro</h3>
            <input type="text" id="nome" placeholder="Nome Completo">
            <input type="text" id="escola" placeholder="Nome da Escola">
            <input type="text" id="turma" placeholder="Turma (ex: 102)">
            <button class="btn-primary" onclick="salvarNovoUsuario()">Cadastrar e Entrar</button>
        </div>

        <!-- Lista de Jogos -->
        <div id="tela-jogos" class="hidden">
            <h3>Olá, <span id="user-nome"></span>!</h3>
            <p>Selecione seu desafio:</p>
            <ul>
                <li><a href="jogos/matematica/index.html">🎮 Desafio de Matemática</a></li>
                <li><a href="jogos/portugues/index.html">📚 Caça-Palavras</a></li>
            </ul>
            <button class="btn-danger" onclick="logout()">Sair / Trocar Usuário</button>
        </div>
    </div>

    <!-- Importando a lógica da pasta scripts -->
    <script src="scripts/auth.js"></script>
</body>
</html>
